name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run tests
        run: deno task test

      - name: Install smoke test
        if: runner.os != 'Windows'
        run: |
          install_dir="$RUNNER_TEMP/tolkien-vm-name-bin"
          deno task install -- --dir "$install_dir"
          "$install_dir/tolkien-vm-name" --seed ci-install

      - name: Install smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "tolkien-vm-name-bin"
          deno task install -- --dir $installDir
          & (Join-Path $installDir "tolkien-vm-name.exe") --seed ci-install
